# golangci-lint configuration — a focused security-and-quality gate.
# CI runs `golangci-lint run --timeout 5m`; `make lint` runs the same locally.
run:
  timeout: 5m
  go: "1.26"

linters:
  enable:
    - errcheck       # flag unchecked errors (e.g. ignored http.ResponseWriter writes)
    - gosimple       # simplifications
    - govet          # go vet checks
    - ineffassign    # ineffectual assignments
    - staticcheck    # the SA suite
    - unused         # unused code
    - gosec          # security-focused checks (G*)
  disable:
    - typecheck      # redundant with the build step

linters-settings:
  errcheck:
    # Ignore writes to http.ResponseWriter/http.Header under a handler: the
    # client may have gone away and there is nothing actionable to do.
    exclude-functions:
      - (net/http.ResponseWriter).Write
      - (io.Closer).Close
  govet:
    enable-all: true
    disable:
      - fieldalignment  # micro-optimize struct layout; too noisy for this CLI
  gosec:
    excludes:
      - G104  # unhandled errors are covered by errcheck with the exclusions above
      - G304  # file inclusion via variable is intentional throughout (config/state/manifest paths)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - dist
    - bin
    - .tmp
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec        # tests legitimately use weak randomness / hardcoded sample tokens
